# /Users/ilia/IdeaProjects/pet_projects/qa_automation/.github/workflows/monthly-qa.yml
name: Monthly QA Run

on:
  schedule:
    - cron: "0 3 1 * *" # monthly on the 1st at 03:00 UTC
  workflow_dispatch:

permissions: write-all

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      QA_AUTOMATION_IMAGE: ghcr.io/${{ github.repository_owner }}/qa_automation:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare workspace for docker volumes
        run: |
          mkdir -p reports
          chmod 0777 reports

      - name: Docker login (GHCR)
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          if [ -n "$GHCR_TOKEN" ]; then
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          else
            echo "GHCR_TOKEN not set; skipping login"
          fi

      - name: Pull docker images (compose)
        run: |
          set -euo pipefail
          echo "▶ Using image: $QA_AUTOMATION_IMAGE"
          docker compose -f docker-compose.ci.yml pull || true

      # ✅ TEMP DEBUG: after pull / before running compose
      - name: Debug QA image contents (tmp)
        run: |
          set -euo pipefail
          echo "▶ Debugging image: $QA_AUTOMATION_IMAGE"
          docker run --rm --entrypoint sh "$QA_AUTOMATION_IMAGE" -c '
            set -ex

            echo "== java =="
            java -version || true

            echo "== env =="
            echo "CLASSPATH=${CLASSPATH-<empty>}"
            echo "JAVA_HOME=${JAVA_HOME-<empty>}"
            echo "PATH=$PATH"

            echo "== pwd/ls =="
            pwd
            ls -la

            echo "== check common dirs =="
            ls -la /app 2>/dev/null || true
            ls -la /work 2>/dev/null || true
            ls -la /opt 2>/dev/null || true

            echo "== find junit/gatling jars (first 200) =="
            find / -maxdepth 6 -type f \( -iname "*junit*.jar" -o -iname "*gatling*.jar" -o -iname "*.jar" \) 2>/dev/null | head -n 200
          '

      # ✅ TEMP DEBUG: show effective compose + mounts of qa_automation service
      - name: Debug compose config & mounts (tmp)
        run: |
          set -euo pipefail
          echo "▶ Effective compose config:"
          docker compose -f docker-compose.ci.yml config

          export USER_ID="$(id -u)"
          export GROUP_ID="$(id -g)"
          echo "▶ USER_ID:GROUP_ID = ${USER_ID}:${GROUP_ID}"

          echo "▶ Starting qa_automation shortly (for mounts debug)..."
          docker compose -f docker-compose.ci.yml up -d --no-deps qa_automation || true

          CID="$(docker ps -aqf "name=qa_automation-qa_automation-1" | head -n 1)"
          echo "▶ qa_automation container id: ${CID:-<not found>}"

          if [ -n "${CID:-}" ]; then
            echo "▶ Mounts:"
            docker inspect "$CID" --format '{{json .Mounts}}' || true

            echo "▶ Entrypoint/Cmd:"
            docker inspect "$CID" --format 'Entrypoint={{json .Config.Entrypoint}} Cmd={{json .Config.Cmd}}' || true

            echo "▶ Env (filtered):"
            docker inspect "$CID" --format '{{range .Config.Env}}{{println .}}{{end}}' | egrep 'QA_AUTOMATION|REPORTS|USER_ID|GROUP_ID|JAVA|CLASSPATH|PATH' || true
          fi

          docker compose -f docker-compose.ci.yml rm -sf qa_automation || true

      - name: Run all QA tests (docker compose)
        run: |
          set -euo pipefail

          export USER_ID="$(id -u)"
          export GROUP_ID="$(id -g)"

          echo "▶ Using image: $QA_AUTOMATION_IMAGE"
          echo "▶ USER_ID:GROUP_ID = ${USER_ID}:${GROUP_ID}"

          echo "▶ Starting DB dependencies..."
          docker compose -f docker-compose.ci.yml up -d mysql mongodb

          echo "▶ Running qa_automation..."
          set +e
          docker compose -f docker-compose.ci.yml up --no-deps --abort-on-container-exit --exit-code-from qa_automation qa_automation
          rc=$?
          set -e

          echo "✔ qa_automation finished with rc=$rc"
          echo "▶ Reports on host:"
          ls -la reports || true

          echo "▶ Cleanup..."
          docker compose -f docker-compose.ci.yml down --remove-orphans || true

          # если отчётов вообще нет — фейлим
          if [[ ! -f reports/formy/cucumber.json && ! -f reports/databaseUsage/cucumber.json && ! -f reports/gatling/latest/index.html ]]; then
            echo "❌ No reports generated at all — failing build"
            exit 10
          fi

          # Если контейнер вернул ошибку — фейлим workflow (но отчёты уже есть)
          if [[ "$rc" != "0" ]]; then
            echo "❌ qa_automation failed (rc=$rc) — failing build"
            exit 11
          fi

          echo "✔ All QA test suites finished successfully"

      - name: Sync reports to VPS (versioned)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "Missing VPS secrets (VPS_HOST/VPS_USER/VPS_SSH_KEY)."
            exit 1
          fi

          RUN_ID="$(date -u +'%Y-%m-%d_%H-%M-%S')"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

          echo "$VPS_SSH_KEY" > /tmp/vps_key
          chmod 600 /tmp/vps_key

          ssh -i /tmp/vps_key -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "mkdir -p /home/pet_projects/qa_automation/reports/runs/$RUN_ID"

          scp -i /tmp/vps_key -o StrictHostKeyChecking=no -r \
            reports/* "$VPS_USER@$VPS_HOST:/home/pet_projects/qa_automation/reports/runs/$RUN_ID/"

          ssh -i /tmp/vps_key -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "echo $RUN_ID > /home/pet_projects/qa_automation/reports/LATEST"

      - name: Trigger Jenkins ingest
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
        run: |
          if [ -z "$JENKINS_URL" ] || [ -z "$JENKINS_USER" ] || [ -z "$JENKINS_API_TOKEN" ]; then
            echo "Missing Jenkins secrets (JENKINS_URL/JENKINS_USER/JENKINS_API_TOKEN)."
            exit 1
          fi

          if [ -z "${RUN_ID:-}" ]; then
            echo "RUN_ID is empty. Previous step didn't export it to GITHUB_ENV."
            exit 2
          fi

          curl -sS -u "$JENKINS_USER:$JENKINS_API_TOKEN" \
            -X POST "$JENKINS_URL/job/qa_automation_ingest/buildWithParameters?RUN_ID=${RUN_ID}"