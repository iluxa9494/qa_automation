name: Monthly QA Run

on:
  schedule:
    - cron: "0 3 1 * *" # monthly on the 1st at 03:00 UTC
  workflow_dispatch:

permissions: write-all

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare host path for docker volumes
        run: |
          sudo mkdir -p /home/pet_projects
          if [ ! -e /home/pet_projects/qa_automation ]; then
            sudo ln -s "$GITHUB_WORKSPACE" /home/pet_projects/qa_automation
          fi
          mkdir -p reports

      - name: Docker login (GHCR)
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          if [ -n "$GHCR_TOKEN" ]; then
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          else
            echo "GHCR_TOKEN not set; skipping login"
          fi

      - name: Run all QA tests
        run: |
          chmod +x ./run_all_qa.sh
          ./run_all_qa.sh

      - name: Sync reports to VPS (versioned)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "Missing VPS secrets (VPS_HOST/VPS_USER/VPS_SSH_KEY)."
            exit 1
          fi

          RUN_ID="$(date -u +'%Y-%m-%d_%H-%M-%S')"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

          echo "$VPS_SSH_KEY" > /tmp/vps_key
          chmod 600 /tmp/vps_key

          ssh -i /tmp/vps_key -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "mkdir -p /home/pet_projects/qa_automation/reports/runs/$RUN_ID"

          scp -i /tmp/vps_key -o StrictHostKeyChecking=no -r \
            reports/* "$VPS_USER@$VPS_HOST:/home/pet_projects/qa_automation/reports/runs/$RUN_ID/"

          ssh -i /tmp/vps_key -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "echo $RUN_ID > /home/pet_projects/qa_automation/reports/LATEST"

      - name: Trigger Jenkins ingest
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
        run: |
          if [ -z "$JENKINS_URL" ] || [ -z "$JENKINS_USER" ] || [ -z "$JENKINS_API_TOKEN" ]; then
            echo "Missing Jenkins secrets (JENKINS_URL/JENKINS_USER/JENKINS_API_TOKEN)."
            exit 1
          fi

          if [ -z "${RUN_ID:-}" ]; then
            echo "RUN_ID is empty. Previous step didn't export it to GITHUB_ENV."
            exit 2
          fi

          curl -sS -u "$JENKINS_USER:$JENKINS_API_TOKEN" \
            -X POST "$JENKINS_URL/job/qa_automation_ingest/buildWithParameters?RUN_ID=${RUN_ID}"