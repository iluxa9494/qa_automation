services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qa
      MYSQL_USER: qa
      MYSQL_PASSWORD: qa
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  qa_automation:
    image: ${QA_AUTOMATION_IMAGE:-ghcr.io/iluxa9494/qa_automation:latest}
    # ❗️В CI НЕ ПЕРЕОПРЕДЕЛЯЕМ user, чтобы не потерять доступ к /app и jar'ам
    environment:
      REPORTS_DIR: /reports
      QA_DEBUG: "${QA_DEBUG:-0}" # ✅ временно: чтобы включать расширенный вывод из entrypoint (когда добавим поддержку)
    volumes:
      - ./reports:/reports
    command: ["/entrypoint.sh"]
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy