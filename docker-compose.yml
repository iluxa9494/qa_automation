networks:
  qa-net:
    driver: bridge

volumes:
  mysql-data:
  mongo-data:

services:

  formy-tests:
    build:
      context: .
      args:
        SELENIUM_BASE_IMAGE: ${SELENIUM_BASE_IMAGE:-selenium/standalone-chrome:latest}
    image: qa-tests
    container_name: qa-formy-tests
    networks:
      - qa-net
    environment:
      FORMY_BASE_URL: ${FORMY_BASE_URL:-https://formy-project.herokuapp.com}
    command: >
      bash -lc "Xvfb :99 -screen 0 1920x1080x24 &
                cd formyProject &&
                mvn -B test"
    volumes:
      - ./reports/formy:/app/formyProject/target
    restart: "no"


  mongo:
    image: mongo:7
    container_name: qa-mongo
    networks:
      - qa-net
    volumes:
      - mongo-data:/data/db

  mysql:
    image: mysql:8
    container_name: qa-mysql
    networks:
      - qa-net
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test
      MYSQL_USER: test
      MYSQL_PASSWORD: test
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    volumes:
      - mysql-data:/var/lib/mysql

  database-tests:
    image: qa-tests
    container_name: qa-database-tests
    depends_on:
      - mongo
      - mysql
    networks:
      - qa-net
    environment:
      MONGO_URI: mongodb://mongo:27017
      MYSQL_URL: jdbc:mysql://mysql:3306/test
      MYSQL_USER: test
      MYSQL_PASSWORD: test
    command: >
      bash -lc "cd databaseUsage &&
                mvn -B test"
    volumes:
      - ./reports/databaseUsage:/app/databaseUsage/target
    restart: "no"

  restfulbooker-load:
    image: qa-tests
    container_name: qa-gatling-restfulbooker
    networks:
      - qa-net
    environment:
      RESTFUL_BOOKER_BASE_URL: ${RESTFUL_BOOKER_BASE_URL:-https://restful-booker.herokuapp.com}
    command: >
      bash -lc "cd restfulBookerLoad &&
                mvn -B gatling:test"
    volumes:
      - ./reports/gatling:/app/restfulBookerLoad/target/gatling
    restart: "no"