networks:
  qa-net:
    driver: bridge

services:
  # =========================
  # DB dependencies
  # =========================
  mongo:
    image: mongo:7
    container_name: qa-mongo
    networks: [qa-net]
    restart: unless-stopped
    mem_limit: "512m"
    cpus: "0.50"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 30

  mysql:
    image: mysql:8.0
    container_name: qa-mysql
    networks: [qa-net]
    restart: unless-stopped
    mem_limit: "700m"
    cpus: "0.75"
    entrypoint: ["bash", "-lc", "rm -f /var/run/mysqld/*.sock /var/run/mysqld/*.pid || true; exec /usr/local/bin/docker-entrypoint.sh mysqld --mysqlx=0"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test
      MYSQL_USER: test
      MYSQL_PASSWORD: test
    # Чистая БД на каждый запуск (init.sql применяется всегда)
    tmpfs:
      - /var/lib/mysql
    volumes:
      - /home/pet_projects/qa_automation/mysql/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  # =========================
  # QA suites (GHCR image)
  # =========================
  formy-tests:
    image: ${QA_AUTOMATION_IMAGE:-ghcr.io/iluxa9494/qa_automation:latest}
    container_name: qa-formy-tests
    networks: [qa-net]
    depends_on:
      mongo:
        condition: service_healthy
      mysql:
        condition: service_healthy

    # ✅ главное: не даём хрому убить VPS
    shm_size: "256m"
    mem_limit: "1200m"
    cpus: "1.00"

    environment:
      FORMY_BASE_URL: ${FORMY_BASE_URL:-https://formy-project.herokuapp.com}
      DISPLAY: ":99"
      JAVA_OPTS: "-Xms128m -Xmx512m"

    volumes:
      - /home/pet_projects/qa_automation/reports:/reports

    # Avoid login shell noise; keep mvn args in one command to prevent -DforkCount split.
    command: >
      bash -c '
        set -euo pipefail;
        /app/tools/run_formy.sh;
      '
    restart: "no"

  database-tests:
    image: ${QA_AUTOMATION_IMAGE:-ghcr.io/iluxa9494/qa_automation:latest}
    container_name: qa-database-tests
    networks: [qa-net]
    depends_on:
      mongo:
        condition: service_healthy
      mysql:
        condition: service_healthy
    mem_limit: "900m"
    cpus: "0.75"
    environment:
      MONGO_URI: mongodb://mongo:27017
      MYSQL_URL: jdbc:mysql://mysql:3306/test
      MYSQL_USER: test
      MYSQL_PASSWORD: test
      JAVA_OPTS: "-Xms128m -Xmx512m"
    volumes:
      - /home/pet_projects/qa_automation/reports:/reports
    # Avoid login shell noise; keep mvn args in one command to prevent -DforkCount split.
    command: >
      bash -c '
        set -euo pipefail;
        /app/tools/run_database.sh;
      '
    restart: "no"

  restfulbooker-load:
    image: ${QA_AUTOMATION_IMAGE:-ghcr.io/iluxa9494/qa_automation:latest}
    container_name: qa-gatling-restfulbooker
    networks: [qa-net]
    mem_limit: "900m"
    cpus: "0.75"
    environment:
      RESTFUL_BOOKER_BASE_URL: ${RESTFUL_BOOKER_BASE_URL:-https://restful-booker.herokuapp.com}
      JAVA_OPTS: "-Xms128m -Xmx512m"
    volumes:
      - /home/pet_projects/qa_automation/reports:/reports
    # Avoid login shell noise; keep mvn args in one command to prevent -DforkCount split.
    command: >
      bash -c '
        set -euo pipefail;
        /app/tools/run_gatling.sh;
      '
    restart: "no"
