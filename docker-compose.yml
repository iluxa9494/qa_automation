networks:
  qa-net:
    driver: bridge

services:
  # =========================
  # DB dependencies
  # =========================
  mongo:
    image: mongo:7
    container_name: qa-mongo
    networks: [qa-net]
    restart: unless-stopped
    mem_limit: "512m"
    cpus: "0.50"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 30

  mysql:
    image: mysql:8.0
    container_name: qa-mysql
    networks: [qa-net]
    restart: unless-stopped
    mem_limit: "700m"
    cpus: "0.75"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test
      MYSQL_USER: test
      MYSQL_PASSWORD: test
    # Чистая БД на каждый запуск (init.sql применяется всегда)
    tmpfs:
      - /var/lib/mysql
    volumes:
      - /home/pet_projects/qa_automation/mysql/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  # =========================
  # QA suites (GHCR image)
  # =========================
  formy-tests:
    image: ${QA_AUTOMATION_IMAGE:-ghcr.io/iluxa9494/qa_automation:latest}
    container_name: qa-formy-tests
    networks: [qa-net]
    depends_on:
      mongo:
        condition: service_healthy
      mysql:
        condition: service_healthy

    # ✅ главное: не даём хрому убить VPS
    shm_size: "256m"
    mem_limit: "1200m"
    cpus: "1.00"

    environment:
      FORMY_BASE_URL: ${FORMY_BASE_URL:-https://formy-project.herokuapp.com}
      DISPLAY: ":99"
      MAVEN_OPTS: "-Xms128m -Xmx512m"

    volumes:
      - /home/pet_projects/qa_automation/reports:/reports

    # Avoid login shell noise; keep mvn args in one command to prevent -DforkCount split.
    command: >
      bash -c '
        set -euo pipefail;
        mkdir -p /reports/formy/cucumber-html-report /reports/formy/surefire;
        Xvfb :99 -screen 0 1280x720x24 >/dev/null 2>&1 &
        cd /app/formyProject;
        cmd=(mvn -B test -DforkCount=1 -DreuseForks=false -Dparallel=none -DthreadCount=1
          -Dcucumber.plugin="json:/reports/formy/cucumber.json,html:/reports/formy/cucumber-html-report"
          -Dsurefire.reportsDirectory=/reports/formy/surefire);
        echo "+ ${cmd[*]}";
        "${cmd[@]}";
      '
    restart: "no"

  database-tests:
    image: ${QA_AUTOMATION_IMAGE:-ghcr.io/iluxa9494/qa_automation:latest}
    container_name: qa-database-tests
    networks: [qa-net]
    depends_on:
      mongo:
        condition: service_healthy
      mysql:
        condition: service_healthy
    mem_limit: "900m"
    cpus: "0.75"
    environment:
      MONGO_URI: mongodb://mongo:27017
      MYSQL_URL: jdbc:mysql://mysql:3306/test
      MYSQL_USER: test
      MYSQL_PASSWORD: test
      MAVEN_OPTS: "-Xms128m -Xmx512m"
    volumes:
      - /home/pet_projects/qa_automation/reports:/reports
    # Avoid login shell noise; keep mvn args in one command to prevent -DforkCount split.
    command: >
      bash -c '
        set -euo pipefail;
        mkdir -p /reports/databaseUsage /reports/databaseUsage/surefire;
        cd /app/databaseUsage;
        cmd=(mvn -B test -DforkCount=1 -DreuseForks=false -Dparallel=none -DthreadCount=1
          -Dcucumber.plugin="json:/reports/databaseUsage/cucumber.json,html:/reports/databaseUsage/cucumber.html"
          -Dsurefire.reportsDirectory=/reports/databaseUsage/surefire);
        echo "+ ${cmd[*]}";
        "${cmd[@]}";
      '
    restart: "no"

  restfulbooker-load:
    image: ${QA_AUTOMATION_IMAGE:-ghcr.io/iluxa9494/qa_automation:latest}
    container_name: qa-gatling-restfulbooker
    networks: [qa-net]
    mem_limit: "900m"
    cpus: "0.75"
    environment:
      RESTFUL_BOOKER_BASE_URL: ${RESTFUL_BOOKER_BASE_URL:-https://restful-booker.herokuapp.com}
      MAVEN_OPTS: "-Xms128m -Xmx512m"
    volumes:
      - /home/pet_projects/qa_automation/reports:/reports
    # Avoid login shell noise; keep mvn args in one command to prevent -DforkCount split.
    command: >
      bash -c '
        set -euo pipefail;
        mkdir -p /reports/gatling;
        cd /app/restfulBookerLoad;
        cmd=(mvn -B gatling:test -Dgatling.resultsFolder=/reports/gatling);
        echo "+ ${cmd[*]}";
        "${cmd[@]}";
        LAST_DIR="$$(ls -1dt /reports/gatling/*/ 2>/dev/null | head -n 1 || true)";
        if [[ -n "$$LAST_DIR" ]]; then
          rm -rf /reports/gatling/latest;
          mkdir -p /reports/gatling/latest;
          cp -a "$${LAST_DIR%/}"/. /reports/gatling/latest/;
        else
          echo "⚠ Gatling report directory not found in /reports/gatling";
          exit 2
        fi
      '
    restart: "no"
